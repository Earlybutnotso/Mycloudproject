<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Монитор статусов Supabase</title>
    <!-- Подключение библиотеки Supabase через CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .user-card { border: 1px solid #ccc; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .controls { margin-top: 20px; padding: 15px; background: #f0f0f0; }
    </style>
</head>
<body>

    <h1>Монитор статусов</h1>
    <div id="status-list">Загрузка данных...</div>

    <div class="controls">
        <h3>Обновить мой статус</h3>
        <input type="text" id="new-status" placeholder="Введите новый статус">
        <button onclick="updateStatus()">Обновить</button>
    </div>

    <script>
        // 1. Инициализация (используйте свои ключи из настроек проекта Supabase)
        const SUPABASE_URL = 'https://ktnmdigdnpgklgdndluk.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0bm1kaWdkbnBna2xnZG5kbHVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MjE3MDEsImV4cCI6MjA5MTE5NzcwMX0.TKZXEXuQDVVcS_73BEZsfYsL2BsvCPeP8mETf5N4Frw';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ВАЖНО: Скопируйте ваш ID из таблицы profiles в Supabase
        const MY_USER_ID = 'eed2d41e-e894-4088-af29-8ced5271d359'; 

        // 2. Функция для получения и отображения данных (SELECT)
        async function fetchStatuses() {
            const { data, error } = await supabase
                .from('profiles')
                .select('username, status');

            if (error) {
                console.error('Ошибка при получении данных:', error);
                return;
            }

            const listDiv = document.getElementById('status-list');
            listDiv.innerHTML = ''; // Очистка перед обновлением

            data.forEach(user => {
                const card = document.createElement('div');
                card.className = 'user-card';
                card.innerHTML = `<strong>${user.username}</strong>: ${user.status || 'Статус не установлен'}`;
                listDiv.appendChild(card);
            });
        }

        // 3. Функция для обновления статуса (UPDATE)
        async function updateStatus() {
            const statusInput = document.getElementById('new-status');
            const newStatus = statusInput.value;

            const { error } = await supabase
                .from('profiles')
                .update({ status: newStatus })
                .eq('id', MY_USER_ID); // Обновление по вашему ID [1]

            if (error) {
                alert('Ошибка обновления: ' + error.message);
            } else {
                alert('Статус обновлен!');
                statusInput.value = '';
                fetchStatuses(); // Обновляем список на экране
            }
        }

        // 4. Настройка Realtime (синхронизация в реальном времени)
        supabase
            .channel('public:profiles')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, () => {
                fetchStatuses(); // Авто-обновление при любых изменениях в базе [2]
            })
            .subscribe();

        // Первоначальная загрузка данных
        fetchStatuses();
    </script>
</body>
</html>
