<!DOCTYPE html> 
<html lang="ru"> 
<head> 
 <meta charset="UTF-8"> 
 <title>Мой облачный проект</title> 
<style>
    body{ font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background-color: #f4f4f9; }
    .form-container {background: white; padding: 25px; border-radius" 10px; bo-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px}
    input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    button {width : 100%; padding: 10px; background: #f4b300; border: none; color : white; font-weight: bold; cursor: pointer; border-radius: 5px; }
    button:hover {background: #dfa400; }
   </style>
</head>
<body>

<div class="form-container">
    <h3>Отправить заявку</h3>
    <form id="feedbackForm">
        <input type="text" id="userName" placeholder="Ваше имя" required>
        <input type="email" id="userEmail" placeholder="Ваш Email" required>
        <button type="submit">Отправить в облако</button>
    </form>
</div>

<script type="module">
    import {initializeApp} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app/js";
    import { etFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
 const firebaseConfig = {
  apiKey: "AIzaSyCu6pCIkzlcFHyoFyo6eavyUCLuzLBh0dc",
  authDomain: "kafeshka.firebaseapp.com",
  projectId: "kafeshka",
  storageBucket: "kafeshka.firebasestorage.app",
  messagingSenderId: "1068703609166",
  appId: "1:1068703609166:web:553598842b0c68cd74ae1f",
  measurementId: "G-ZNV18CQKLV"
};

const app =initializeApp(firebaseConfig);
const db = getFirestore(app);

 document.getElementById("feedbackForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const nameInput = document.getElementById("userName").value;
  const emailInput = document.getElementById("userEmail").value;

  try {
      await addDoc(collection(db, "requests"),{
          name: nameInput,
          email:emailInput,
          timestamp: new Date()
      });
      alert("Готово! Данные сохранены в Firebase.");
      document.getElementById("feedbackForm").reset();
  } catch (error) {
      console.error("Ошибка записи: ", error);
      alert("Ошибка при отправке!")
  }
 });
</script>
</body>
</html>
